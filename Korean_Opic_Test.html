<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIc · Korean Speaking Test [TTS Mode]</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#141414;--paper:#F7F6F2;--mist:#E8E5DE;--mid:#9B97A0;
  --faint:#F0EEE9;--white:#fff;
  --kr:#D44F6E;--kr-dark:#A83454;--kr-soft:#FCEEF2;--kr-mid:#F5C0CE;
  --accent:#F2A93B;--r:14px;--ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--paper);color:var(--ink);overflow:hidden}
#lobby{display:none!important}

/* ══ EXAM ══ */
#exam{display:none;flex-direction:column;height:100vh;overflow:hidden;background:var(--paper)}

/* hero topbar */
.topbar{
  background:linear-gradient(135deg,var(--kr) 0%,#a8325a 100%);
  padding:.5rem 4vw .45rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
}
.topbar::before{content:'OPIc';position:absolute;right:3vw;top:50%;transform:translateY(-50%);font-size:clamp(2rem,6vw,4rem);font-weight:700;color:rgba(255,255,255,.06);pointer-events:none}
.top-q{font-family:'DM Serif Display',serif;font-size:.95rem;color:#fff;letter-spacing:-.01em}
.btn-signout{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:99px;color:rgba(255,255,255,.85);font-family:'Sora',sans-serif;font-size:.65rem;font-weight:600;padding:.26rem .7rem;cursor:pointer;display:flex;align-items:center;gap:.3rem;transition:background .18s}
.btn-signout:hover{background:rgba(255,255,255,.22)}

/* question strip */
.q-strip-wrap{border-bottom:1.5px solid var(--mist);padding:.45rem 4vw;flex-shrink:0;background:rgba(247,246,242,.97);backdrop-filter:blur(8px)}
.q-strip-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--mid);margin-bottom:.3rem}
.q-strip{display:flex;gap:.28rem;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.q-strip::-webkit-scrollbar{display:none}
.q-chip{
  flex-shrink:0;width:30px;height:30px;border-radius:6px;
  border:1.5px solid var(--mist);background:var(--white);
  font-size:.7rem;font-weight:700;color:var(--mid);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s var(--ease);
}
.q-chip:hover{border-color:var(--kr-mid);color:var(--kr)}
.q-chip.active{background:var(--kr);border-color:var(--kr-dark);color:#fff;transform:scale(1.1)}
.q-chip.done{background:var(--faint);border-color:var(--mist);color:var(--mid)}

/* main grid */
.exam-main{
  flex:1;display:grid;grid-template-columns:auto 1fr;
  align-items:start;padding:1rem 4vw;gap:1rem;
  overflow:hidden;min-height:0;
}

/* LEFT */
.left{display:flex;align-items:flex-start;gap:.5rem;flex-shrink:0}
.avatar-col{display:flex;flex-direction:column;width:110px}
.avatar-box{width:110px;border:1.5px solid var(--mist);border-radius:var(--r);overflow:hidden;background:var(--faint)}
.avatar-img{width:110px;height:140px;display:block;object-fit:cover;object-position:center top}
.replay-bar{background:var(--kr);padding:.28rem .5rem;display:flex;align-items:center;gap:.35rem;cursor:pointer;height:28px;transition:background .18s}
.replay-bar:hover{background:var(--kr-dark)}
.replay-icon{width:20px;height:20px;background:rgba(255,255,255,.18);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.78rem;flex-shrink:0}
.replay-track{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden}
.replay-fill{height:100%;background:#fff;border-radius:99px;transition:width .25s linear;width:0%}

/* vertical volume */
.vol-col{display:flex;flex-direction:column;align-items:center;gap:.3rem}
.vol-track{width:4px;height:140px;background:var(--mist);border-radius:99px;position:relative;cursor:pointer;flex-shrink:0}
.vol-fill{position:absolute;bottom:0;left:0;right:0;background:var(--kr);border-radius:99px}
.vol-handle{position:absolute;left:50%;transform:translateX(-50%);width:12px;height:12px;background:var(--ink);border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:grab}
.vol-mic{font-size:.9rem;color:var(--mid)}

/* RIGHT */
.right{height:168px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;overflow:hidden}
.right-inner{display:flex;flex-direction:column;gap:.7rem}
.next-anchor{display:flex;justify-content:flex-end}

/* Recording button */
.btn-record{
  width:100%;background:var(--kr);border:none;border-radius:var(--r);
  color:#fff;font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;
  padding:.7rem 1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  transition:background .18s,transform .12s,box-shadow .18s;
  box-shadow:0 3px 12px rgba(212,79,110,.28);flex-shrink:0;
}
.btn-record:hover{background:var(--kr-dark);transform:scale(1.02)}
.btn-record.recording{background:var(--kr);animation:recPulse 1.5s ease-in-out infinite}
@keyframes recPulse{0%,100%{box-shadow:0 3px 12px rgba(212,79,110,.28)}50%{box-shadow:0 3px 22px rgba(212,79,110,.5)}}
.rec-wave{display:none;gap:2px;align-items:flex-end;height:14px}
.btn-record.recording .rec-wave{display:flex}
.btn-record.recording .rec-txt{display:none}
.wbar{width:3px;border-radius:2px;background:rgba(255,255,255,.9);animation:wv .65s ease-in-out infinite alternate}
.wbar:nth-child(2){animation-delay:.1s}.wbar:nth-child(3){animation-delay:.2s}
.wbar:nth-child(4){animation-delay:.07s}.wbar:nth-child(5){animation-delay:.16s}
@keyframes wv{from{height:3px}to{height:12px}}

/* Response Time */
.resp-section{display:flex;flex-direction:column;gap:.28rem;flex-shrink:0}
.resp-label{font-size:.72rem;font-weight:700;color:var(--ink)}
.resp-bar-outer{height:20px;border:1.5px solid var(--mist);border-radius:6px;background:var(--white);overflow:hidden}
.resp-bar-inner{height:100%;background:var(--kr);border-radius:5px;transition:width .5s linear}
.resp-bar-inner.warn{background:var(--accent)}
.resp-bar-inner.urgent{background:#ef4444}
.resp-time-row{display:flex;justify-content:flex-end}
.resp-time{font-size:.72rem;font-weight:700;color:var(--mid)}

/* Next button */
.btn-next{
  background:var(--accent);border:none;border-radius:var(--r);
  color:#fff;font-family:'Sora',sans-serif;font-size:.78rem;font-weight:700;
  padding:.45rem 1.2rem;cursor:pointer;
  display:flex;align-items:center;gap:.3rem;
  transition:background .18s,transform .12s;
  box-shadow:0 2px 8px rgba(242,169,59,.3);
}
.btn-next:hover{background:#d9922a;transform:translateY(-1px)}

/* ══ RESULT ══ */
#result{display:none;max-width:620px;margin:0 auto;padding:2rem 4vw 3rem;overflow-y:auto;height:100vh;background:var(--paper)}
.result-h{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--ink);margin-bottom:.25rem}
.result-sub{font-size:.78rem;color:var(--mid);margin-bottom:1.3rem;line-height:1.6}
.r-list{background:var(--white);border:1.5px solid var(--mist);border-radius:var(--r);overflow:hidden;margin-bottom:1.1rem}
.r-list-head{background:var(--faint);padding:.5rem 1rem;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mid);border-bottom:1px solid var(--mist)}
.r-item{display:flex;align-items:flex-start;gap:.6rem;padding:.62rem 1rem;border-bottom:1px solid var(--faint);transition:background .14s}
.r-item:last-child{border-bottom:none}
.r-item:hover{background:var(--kr-soft)}
.r-num{width:22px;height:22px;background:var(--kr-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:var(--kr);flex-shrink:0;margin-top:.1rem}
.r-text{font-family:'Noto Sans KR',sans-serif;font-size:.78rem;line-height:1.6;flex:1;color:var(--ink)}
.r-play{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--mid);flex-shrink:0;transition:color .15s,transform .12s}
.r-play:hover{color:var(--kr);transform:scale(1.15)}
.r-btns{display:flex;gap:.6rem}
.btn-retake{flex:1;background:var(--kr);border:none;border-radius:var(--r);color:#fff;font-family:'Sora',sans-serif;font-size:.8rem;font-weight:700;padding:.65rem 1rem;cursor:pointer;transition:background .18s,transform .12s;box-shadow:0 2px 10px rgba(212,79,110,.25)}
.btn-retake:hover{background:var(--kr-dark);transform:translateY(-1px)}
.btn-home{flex:1;background:var(--white);border:1.5px solid var(--mist);border-radius:var(--r);color:var(--ink);font-family:'Sora',sans-serif;font-size:.8rem;font-weight:700;padding:.65rem 1rem;cursor:pointer;transition:border-color .18s,transform .12s}
.btn-home:hover{border-color:var(--kr);transform:translateY(-1px)}



.btn-record:disabled{background:var(--mist);color:var(--mid);cursor:not-allowed;box-shadow:none;transform:none;animation:none}

/* hero title row */
.hero-line{display:flex;align-items:baseline;gap:.5rem}
.hero-eye{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);white-space:nowrap}
.hero-title{font-family:'DM Serif Display',serif;font-size:1.05rem;color:#fff;line-height:1;letter-spacing:-.01em;margin:0}
.hero-title em{font-style:italic;color:rgba(255,255,255,.75)}

/* refresh button */
.btn-refresh{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:99px;color:rgba(255,255,255,.9);font-family:'Sora',sans-serif;font-size:.65rem;font-weight:700;padding:.26rem .75rem;cursor:pointer;display:flex;align-items:center;gap:.3rem;transition:background .18s,transform .15s;white-space:nowrap}
.btn-refresh:hover{background:rgba(255,255,255,.25);transform:scale(1.05)}

/* toast */
.toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(44px);background:var(--ink);color:#fff;padding:.4rem 1rem;border-radius:99px;font-size:.7rem;font-weight:600;z-index:999;pointer-events:none;opacity:0;transition:transform .22s,opacity .22s;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
</style>

</head>
<body>



<!-- EXAM -->
<div id="exam">
  <!-- Topbar -->
  <div class="topbar">
    <div class="hero-line">
      <p class="hero-eye">Korean</p>
      <h1 class="hero-title">🇰🇷 <em>OPIc Test</em></h1>
    </div>
    <button class="btn-refresh" onclick="loadRandom()" title="Chọn đề ngẫu nhiên">🔀 Refresh</button>
  </div>

  <!-- Horizontal question strip -->
  <div class="q-strip-wrap">
    <div class="q-strip-label" id="qProgressLabel">Question 1 of 15</div>
    <div class="q-strip" id="qStrip"></div>
  </div>

  <!-- Main -->
  <div class="exam-main">
    <!-- LEFT -->
    <div class="left">
      <div class="avatar-col">
        <div class="avatar-box">
          <img class="avatar-img" id="avatarImg"
               src="https://corsproxy.io/?url=https://luandai123.github.io/Korean_Opic/AvatarOPIC.png"
               alt="OPIc Interviewer">
          <div class="replay-bar" id="replayBar" onclick="handlePlay()">
            <div class="replay-icon" id="playIcon">▶</div>
            <div class="replay-track"><div class="replay-fill" id="replayFill"></div></div>
          </div>
        </div>
      </div>

      <!-- Vertical volume -->
      <div class="vol-col">
        <div class="vol-track" id="volTrack" onclick="volClick(event)">
          <div class="vol-fill" id="volFill" style="height:80%"></div>
          <div class="vol-handle" id="volHandle" style="bottom:calc(80% - 6px)"></div>
        </div>
        <div class="vol-mic">🎤</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="right-inner">
        <!-- Recording button -->
        <button class="btn-record" id="btnRec" onclick="toggleRec()" disabled>
          <span style="font-size:1.15rem">🎤</span>
          <span class="rec-txt" id="recTxt">Recording...</span>
          <span class="rec-wave">
            <span class="wbar" style="height:4px"></span>
            <span class="wbar" style="height:9px"></span>
            <span class="wbar" style="height:6px"></span>
            <span class="wbar" style="height:10px"></span>
            <span class="wbar" style="height:5px"></span>
          </span>
        </button>

        <!-- Response Time -->
        <div class="resp-section" id="respSection" style="display:none">
          <div class="resp-label">Response Time:</div>
          <div class="resp-bar-outer">
            <div class="resp-bar-inner" id="respBar" style="width:100%"></div>
          </div>
          <div class="resp-time-row">
            <span class="resp-time" id="respTime">1:30</span>
          </div>
        </div>
      </div>

      <!-- Next anchored to bottom-right -->
      <div class="next-anchor">
        <button class="btn-next" onclick="nextQ()">Next ›</button>
      </div>
    </div>
  </div>

</div>

<!-- RESULT -->
<div id="result">
  <div class="result-h">✅ Hoàn thành bài thi!</div>
  <div class="result-sub">Nhấn 🔊 để nghe lại từng câu.</div>
  <div class="r-list">
    <div class="r-list-head">Câu hỏi — <span id="rName"></span></div>
    <div id="rList"></div>
  </div>
  <div class="r-btns">
    <button class="btn-retake" onclick="retake()">🔄 Thi lại đề này</button>
    <button class="btn-home" onclick="loadRandom()">🔀 Đề ngẫu nhiên</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ALL=[
["Test 1",1,"지금부터 인터뷰를 시작하겠습니다. 먼저 자기에 대해 말하십시오!","https://luandai123.github.io/Korean_Opic/Test 1.1.mp3"],
["Test 1",2,"학교 밖 생활에 어떻게 적응했습니까?","https://luandai123.github.io/Korean_Opic/Test 1.2.mp3"],
["Test 1",3,"졸업 후 가장 큰 변화는 무엇입니까?","https://luandai123.github.io/Korean_Opic/Test 1.3.mp3"],
["Test 1",4,"학교 다닐 때 어떤 능력을 개발하여 경력에 도움이 되었나요?","https://luandai123.github.io/Korean_Opic/Test 1.4.mp3"],
["Test 1",5,"어디에 사는지 알고 싶습니다. 집에 대해 묘사해 줄 수 있습니까? 방이 몇 개입니까?","https://luandai123.github.io/Korean_Opic/Test 1.5.mp3"],
["Test 1",6,"어릴 때 살았던 집을 설명해 주십시오. 현재 살고 있는 집과 어떻게 달랐습니까?","https://luandai123.github.io/Korean_Opic/Test 1.6.mp3"],
["Test 1",7,"룸메이트와 함께 사는 것보다 아파트에서 혼자 사는 것이 더 쉽거나 더 어렵다고 생각하십니까?","https://luandai123.github.io/Korean_Opic/Test 1.7.mp3"],
["Test 1",8,"개인적인 이유로 스포츠나 신체 활동에 참여하지 않기로 결정한 상황의 예를 들어줄 수 있습니까?","https://luandai123.github.io/Korean_Opic/Test 1.8.mp3"],
["Test 1",9,"스포츠나 운동 외에 즐기는 다른 활동은 무엇입니까?","https://luandai123.github.io/Korean_Opic/Test 1.9.mp3"],
["Test 1",10,"다른 사람에게 스포츠나 신체 활동에 참여하도록 권유한 적이 있습니까? 결과는 어땠습니까?","https://luandai123.github.io/Korean_Opic/Test 1.10.mp3"],
["Test 1",11,"미안합니다. 당신은 친구와 함께 패키지 여행을 계획했는데, 여행사에서 출발 날짜가 지연됐다고 전화가 왔습니다. 친구에게 전화를 걸어 상황을 설명하고 두세 가지 대안을 제시하십시오.","https://luandai123.github.io/Korean_Opic/Test 1.11.mp3"],
["Test 1",12,"미안합니다. 해변 여행을 가는 당일에 날씨가 좋지 않습니다. 친구에게 전화해서 상황을 설명하고 가까운 미래에 언제 여행을 갈 수 있는지 몇 가지 제안을 하십시오.","https://luandai123.github.io/Korean_Opic/Test 1.12.mp3"],
["Test 1",13,"다음에 롤플레이 상황을 잘 듣고 맡은 역할을 연기해 주십시오. 데이트를 하기 위해 친구의 오토바이를 빌리려고 합니다. 서너 가지 질문을 하십시오.","https://luandai123.github.io/Korean_Opic/Test 1.13.mp3"],
["Test 1",14,"저는 미국에 살고 있습니다. 제가 살고 있는 지역의 교통수단에 관해 서너 가지 질문을 해 주세요.","https://luandai123.github.io/Korean_Opic/Test 1.14.mp3"],
["Test 1",15,"기업은 인권에 대해 어떠한 책임을 가지고 있을까요?","https://luandai123.github.io/Korean_Opic/Test 1.15.mp3"],
["Test 2",1,"지금부터 인터뷰를 시작하겠습니다. 먼저 자기에 대해 말하십시오!","https://luandai123.github.io/Korean_Opic/Test 2.1.mp3"],
["Test 2",2,"어렸을 때 살던 곳과 주변 지역에 대해 이야기해 주십시오. 어린 시절의 집을 자세히 묘사하십시오.","https://luandai123.github.io/Korean_Opic/Test 2.2.mp3"],
["Test 2",3,"한동안 아파트에서 혼자 살고 난 후, 집처럼 느껴지도록 어떤 변화를 가져왔나요?","https://luandai123.github.io/Korean_Opic/Test 2.3.mp3"],
["Test 2",4,"룸메이트와 함께 사는 것보다 아파트에서 혼자 사는 것이 더 쉽거나 더 어렵다고 생각하십니까?","https://luandai123.github.io/Korean_Opic/Test 2.4.mp3"],
["Test 2",5,"설문지에 공원에 자주 간다고 표시했습니다. 지금까지 가 본 공원 두 곳을 골라 비교해 보십시오.","https://luandai123.github.io/Korean_Opic/Test 2.5.mp3"],
["Test 2",6,"공원에서 겪었던 기억에 남는 경험을 말씀해 주십시오. 무슨 일이 일어났는지 자세히 말씀해 주십시오.","https://luandai123.github.io/Korean_Opic/Test 2.6.mp3"],
["Test 2",7,"자주 가는 공원에서 아이들과 어른들이 하는 활동들을 비교하고 어떤 시설을 즐겨 이용하는지 말씀해 주십시오.","https://luandai123.github.io/Korean_Opic/Test 2.7.mp3"],
["Test 2",8,"얼마나 자주 해변에 갑니까? 주로 어디로 갑니까? 누구와 함께 갑니까?","https://luandai123.github.io/Korean_Opic/Test 2.8.mp3"],

const TESTS=[...new Set(ALL.map(r=>r[0]))];
function getTest(n){return ALL.filter(r=>r[0]===n);}

let curTest=null,curIdx=0,startMs=null;
let audio=null,vol=0.8,isRec=false,hasPlayed=false;
let respInt=null,respSec=0,respTotal=90;

/* pick random test */
function loadRandom(){
  const name=TESTS[Math.floor(Math.random()*TESTS.length)];
  startTest(name);
}

/* START */
function startTest(name){
  curTest=name;curIdx=0;startMs=Date.now();
  document.getElementById('result').style.display='none';
  document.getElementById('exam').style.display='flex';
  buildStrip();renderQ();
}

/* STRIP */
function buildStrip(){
  const qs=getTest(curTest),s=document.getElementById('qStrip');s.innerHTML='';
  qs.forEach((_,i)=>{
    const c=document.createElement('div');
    c.className='q-chip'+(i===0?' active':'');c.id='c'+i;c.textContent=i+1;
    c.onclick=()=>jumpTo(i);s.appendChild(c);
  });
}
function syncStrip(){
  const qs=getTest(curTest);
  qs.forEach((_,i)=>{
    const c=document.getElementById('c'+i);if(!c)return;
    c.className='q-chip'+(i===curIdx?' active':i<curIdx?' done':'');
  });
  const ac=document.getElementById('c'+curIdx);
  if(ac) ac.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  const lbl=document.getElementById('qProgressLabel');
  if(lbl) lbl.textContent='Question '+(curIdx+1)+' of '+qs.length;
}

/* JUMP */
function jumpTo(i){
  stopAll();curIdx=i;isRec=false;renderQ();
}

/* RENDER */
function renderQ(){
  const qs=getTest(curTest),q=qs[curIdx];
  syncStrip();
  document.getElementById('replayFill').style.width='0%';
  // reset play icon to Play
  const pi=document.getElementById('playIcon');
  if(pi) pi.textContent='▶';
  // reset record btn
  const rb=document.getElementById('btnRec');
  rb.classList.remove('recording');rb.disabled=true;isRec=false;
  document.getElementById('recTxt').textContent='Recording...';
  document.getElementById('recTxt').style.display='inline';
  rb.querySelector('.rec-wave').style.display='none';
  document.getElementById('respSection').style.display='none';
  clearRespTimer();
  // reset play button
  hasPlayed=false;
  const pb=document.getElementById('btnPlayQ');
  pb.classList.remove('playing');
  document.getElementById('playQIcon').textContent='▶ Play';
  document.getElementById('playWave').style.display='none';
  document.getElementById('playQIcon').style.display='inline';
}

/* AUDIO */
function playAudio(){
  const q=getTest(curTest)[curIdx];
  if(!q[3]){toast('Không có audio');return;}
  if(audio){audio.pause();audio.ontimeupdate=null;audio.onended=null;audio=null;}
  const a=new Audio(q[3]);a.volume=vol;audio=a;

  a.ontimeupdate=()=>{if(a.duration)document.getElementById('replayFill').style.width=(a.currentTime/a.duration*100)+'%';};
  a.onended=()=>{
    document.getElementById('replayFill').style.width='100%';
    audio=null;hasPlayed=true;
    // switch replay bar icon to ↻
    const pi=document.getElementById('playIcon');
    if(pi) pi.textContent='↻';
    // enable record
    document.getElementById('btnRec').disabled=false;
    toast('✅ Nhấn Recording để trả lời');
  };
  a.onerror=()=>{toast('Lỗi audio');audio=null;};
  a.play().catch(()=>{toast('Không phát được');audio=null;});
}
function replayAudio(){playAudio();}
function handlePlay(){playAudio();}

function stopAll(){
  clearRespTimer();isRec=false;
  if(audio){
    audio.pause();audio.ontimeupdate=null;audio.onended=null;audio=null;

  }
}

/* VOLUME */
function volClick(e){
  const t=document.getElementById('volTrack'),rect=t.getBoundingClientRect();
  setVol(Math.max(0,Math.min(1,1-(e.clientY-rect.top)/rect.height)));
}
function setVol(v){
  vol=v;if(audio)audio.volume=vol;
  const pct=(v*100)+'%';
  document.getElementById('volFill').style.height=pct;
  document.getElementById('volHandle').style.bottom='calc('+pct+' - 6px)';
}

/* RECORD */
function toggleRec(){
  isRec=!isRec;
  const rb=document.getElementById('btnRec');
  rb.classList.toggle('recording',isRec);
  document.getElementById('recTxt').style.display=isRec?'none':'inline';
  rb.querySelector('.rec-wave').style.display=isRec?'flex':'none';
  if(isRec){startRespTimer();toast('🔴 Đang ghi âm');}
  else{clearRespTimer();document.getElementById('respSection').style.display='none';toast('⏹ Đã dừng');}
}

/* TIMER */
function startRespTimer(){
  clearRespTimer();
  const q=getTest(curTest)[curIdx];
  respTotal=RESP[q[1]]||90;respSec=respTotal;
  document.getElementById('respSection').style.display='flex';
  drawResp();
  respInt=setInterval(()=>{respSec--;drawResp();if(respSec<=0){clearRespTimer();autoNext();}},1000);
}
function drawResp(){
  const pct=Math.max(0,respSec/respTotal*100);
  const bar=document.getElementById('respBar');
  bar.style.width=pct+'%';
  bar.className='resp-bar-inner'+(respSec<=10?' urgent':respSec<=20?' warn':'');
  const m=String(Math.floor(respSec/60)).padStart(2,'0'),s=String(respSec%60).padStart(2,'0');
  document.getElementById('respTime').textContent=`${m}:${s}`;
}
function clearRespTimer(){clearInterval(respInt);respInt=null;}
function autoNext(){toast('⏰ Hết giờ');setTimeout(()=>nextQ(),800);}

/* NEXT */
function nextQ(){
  stopAll();
  const total=getTest(curTest).length;
  if(curIdx<total-1){curIdx++;isRec=false;renderQ();}
  else finish();
}

/* FINISH */
function finish(){
  stopAll();
  const el=Math.round((Date.now()-startMs)/1000);
  const m=String(Math.floor(el/60)).padStart(2,'0'),s=String(el%60).padStart(2,'0');
  document.getElementById('exam').style.display='none';
  document.getElementById('rName').textContent=curTest+' · '+m+':'+s;
  const qs=getTest(curTest);
  document.getElementById('rList').innerHTML=qs.map(q=>`
    <div class="r-item">
      <div class="r-num">${q[1]}</div>
      <div class="r-text">${q[2]}</div>
      <button class="r-play" onclick="playResult('${q[3]}')">🔊</button>
    </div>`).join('');
  document.getElementById('result').style.display='block';
  window.scrollTo(0,0);
}
function playResult(url){
  if(!url){toast('Không có audio');return;}
  if(audio){audio.pause();audio=null;}
  const a=new Audio(url);a.volume=vol;audio=a;
  a.play().catch(()=>toast('Không phát được'));
  toast('🔊 Đang phát...');
}

function retake(){document.getElementById('result').style.display='none';startTest(curTest);}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('on'),2200);
}

loadRandom();
</script>
</body>
</html>
