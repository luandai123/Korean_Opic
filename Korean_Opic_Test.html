<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIc · Korean Speaking Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Noto+Sans+KR:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#141414;--paper:#F7F6F2;--mist:#E8E5DE;--mid:#9B97A0;
  --faint:#F0EEE9;--white:#fff;
  --kr:#D44F6E;--kr-dark:#A83454;--kr-soft:#FCEEF2;--kr-mid:#F5C0CE;
  --accent:#F2A93B;--r:10px;
  /* Avatar width = 28% of viewport width, capped 85px–320px */
  --av:clamp(85px, 28vw, 320px);
  /* vol-col width = fixed 20px */
  --vol-w:20px;
  /* gap between left and right */
  --wrap-gap:clamp(8px,2vw,20px);
  /* side padding */
  --pad:clamp(10px,2vw,20px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--paper);color:var(--ink);overflow:hidden}

#exam{display:none;flex-direction:column;height:100vh;background:var(--paper)}


/* Refresh button in clock bar */
:root{--refresh-w:clamp(80px,12vw,130px)}
.btn-refresh{
  width:var(--refresh-w);
  background:linear-gradient(135deg,var(--kr) 0%,#a8325a 100%);
  border:none;border-radius:var(--r);
  color:#fff;font-family:'Sora',sans-serif;font-weight:700;
  padding:clamp(.35rem,.55vw,.5rem) clamp(.6rem,1vw,.9rem);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.35rem;
  box-shadow:0 2px 10px rgba(212,79,110,.3);
  transition:box-shadow .18s,transform .15s,opacity .15s;
  flex-shrink:0;
}
.btn-refresh:hover{
  box-shadow:0 4px 16px rgba(212,79,110,.45);
  transform:translateY(-1px);
  opacity:.92;
}
.btn-refresh:active{transform:scale(.97)}
.refresh-icon{font-size:clamp(.9rem,1.4vw,1.2rem);line-height:1;transition:transform .4s ease}
.btn-refresh:hover .refresh-icon{transform:rotate(180deg)}
.refresh-label{font-size:clamp(.6rem,.8vw,.82rem);letter-spacing:.03em;white-space:nowrap}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--kr) 0%,#a8325a 100%);padding:clamp(.35rem,.6vw,.6rem) clamp(12px,3vw,32px);flex-shrink:0;display:flex;align-items:center;justify-content:flex-start;position:relative;overflow:hidden}
.topbar::before{content:'OPIc';position:absolute;right:2vw;top:50%;transform:translateY(-50%);font-size:3rem;font-weight:700;color:rgba(255,255,255,.06);pointer-events:none}
.hero-line{display:flex;align-items:baseline;gap:.4rem}
.hero-eye{font-size:clamp(.5rem,.65vw,.75rem);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55)}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(.85rem,1.1vw,1.3rem);color:#fff;margin:0;font-style:italic}


/* CLOCK */
.clock-bar{
  background:#fff;border-bottom:1.5px solid var(--mist);
  display:flex;align-items:center;
  padding:clamp(.25rem,.5vw,.45rem) clamp(12px,2.5vw,24px);
  flex-shrink:0;position:relative;
}
.clock-center{flex:1;display:flex;justify-content:center}
.clock-display{font-family:'DM Serif Display',serif;font-size:clamp(1.4rem,4vw,2.8rem);font-weight:700;color:var(--ink);letter-spacing:.05em;line-height:1}
.clock-display.warn{color:var(--accent)}
.clock-display.urgent{color:#ef4444}

/* MAIN */
.exam-main{
  flex:1;min-height:0;overflow:auto;
  display:flex;align-items:flex-start;justify-content:center;
  padding:clamp(.5rem,1.5vw,1rem) var(--pad);
}
/* exam-wrap fills available width, max 900px */
.exam-wrap{
  display:flex;flex-direction:row;
  gap:var(--wrap-gap);
  align-items:flex-start;
  width:100%;max-width:900px;
  position:relative;
}

/* LEFT */
.left-col{
  display:flex;gap:clamp(4px,.8vw,8px);
  align-items:stretch;flex-shrink:0;
  /* left-col total width = --av + gap + --vol-w */
  width:calc(var(--av) + clamp(4px,.8vw,8px) + var(--vol-w));
}
.avatar-wrap{
  flex:1;display:flex;flex-direction:column;
  border:1.5px solid var(--mist);border-radius:var(--r);
  overflow:hidden;background:var(--white);min-width:0;
}
.avatar-img{
  width:100%;aspect-ratio:3/4;
  display:block;object-fit:cover;object-position:top center;
}
.play-bar{
  background:var(--kr);
  padding:clamp(.22rem,.4vw,.35rem) clamp(.35rem,.6vw,.55rem);
  height:clamp(24px,3.2vw,38px);
  display:flex;align-items:center;gap:.35rem;
  cursor:pointer;flex-shrink:0;transition:background .15s;
}
.play-bar:hover{background:var(--kr-dark)}
.play-icon-btn{
  width:clamp(16px,2.2vw,26px);height:clamp(16px,2.2vw,26px);
  border-radius:4px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:clamp(.65rem,.9vw,.85rem);flex-shrink:0;
}
.play-track{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden}
.play-fill{height:100%;background:#fff;border-radius:99px;width:0%;transition:width .2s linear}

/* VOL */
.vol-col{
  width:var(--vol-w);display:flex;flex-direction:column;
  align-items:center;gap:.25rem;flex-shrink:0;
  align-self:stretch;visibility:hidden;
}
.vol-track{
  width:4px;flex:1;min-height:50px;
  background:var(--mist);border-radius:99px;position:relative;cursor:pointer;
}
.vol-fill{position:absolute;bottom:0;left:0;right:0;background:var(--kr);border-radius:99px}
.vol-handle{
  position:absolute;left:50%;transform:translateX(-50%);
  width:12px;height:12px;background:var(--ink);
  border-radius:50%;border:2px solid #fff;
  box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:grab;transition:bottom .1s ease;
}
.vol-handle.pulsing{background:var(--kr);border-color:var(--kr-soft)}
.vol-mic{font-size:clamp(.7rem,.9vw,.9rem);color:var(--mid);flex-shrink:0}

/* RIGHT WRAPPER — takes remaining space */
.right-wrapper{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  gap:clamp(.35rem,.6vw,.6rem);
  align-self:stretch;
}

/* Q block */
.q-block{display:flex;flex-direction:column;gap:clamp(.2rem,.4vw,.35rem)}
.q-label{
  font-size:clamp(.55rem,.7vw,.8rem);font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;color:var(--mid);
}
.q-strip{
  display:flex;gap:clamp(.15rem,.35vw,.28rem);
  overflow-x:auto;scrollbar-width:none;padding-bottom:2px;
}
.q-strip::-webkit-scrollbar{display:none}
.q-chip{
  flex-shrink:0;
  width:clamp(20px,5.5vw,40px);height:clamp(20px,5.5vw,40px);
  border-radius:5px;border:1.5px solid var(--mist);background:var(--white);
  font-size:clamp(.52rem,1.3vw,.9rem);font-weight:700;color:var(--mid);
  display:flex;align-items:center;justify-content:center;
}
.q-chip.active{background:var(--kr);border-color:var(--kr-dark);color:#fff}
.q-chip.done{background:var(--faint);color:var(--mid)}

/* Controls */
.right-col{
  display:flex;flex-direction:column;
  gap:clamp(.4rem,.7vw,.75rem);visibility:hidden;
}

/* Recording */
.btn-record{
  width:100%;background:#3B82F6;border:none;border-radius:var(--r);
  color:#fff;font-family:'Sora',sans-serif;
  font-size:clamp(.68rem,1.2vw,1rem);font-weight:700;
  padding:clamp(.48rem,.8vw,.78rem) clamp(.6rem,1vw,1rem);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.45rem;
  transition:background .15s;box-shadow:0 2px 10px rgba(59,130,246,.28);
}
.btn-record:hover{background:#2563EB}
.btn-record:disabled{background:var(--mist);color:var(--mid);cursor:not-allowed;box-shadow:none}
.rec-dots{
  font-size:clamp(.85rem,1.1vw,1.1rem);letter-spacing:.15em;
  color:rgba(255,255,255,.9);animation:dotsFade 1.2s ease-in-out infinite;
}
@keyframes dotsFade{0%,100%{opacity:.3}50%{opacity:1}}

/* Response time */
.resp-section{display:flex;flex-direction:column;gap:clamp(.2rem,.3vw,.3rem)}
.resp-label{font-size:clamp(.62rem,.85vw,.95rem);font-weight:600;color:var(--ink)}
.resp-bar-outer{
  height:clamp(14px,2vw,26px);border:1.5px solid #ccc;
  border-radius:4px;background:var(--white);overflow:hidden;
}
.resp-bar-inner{height:100%;background:#3B82F6;transition:width .5s linear}
.resp-bar-inner.warn{background:var(--accent)}
.resp-bar-inner.urgent{background:#ef4444}
.resp-time-row{display:flex;justify-content:flex-end}
.resp-time{font-size:clamp(.62rem,.85vw,.95rem);font-weight:700;color:var(--mid)}

/* Next */
.next-anchor{
  display:flex;justify-content:flex-end;
  margin-top:auto;padding-top:clamp(.3rem,.5vw,.5rem);
  visibility:hidden;
}
.btn-next{
  background:var(--accent);border:none;border-radius:var(--r);
  color:#fff;font-family:'Sora',sans-serif;
  font-size:clamp(.65rem,.85vw,.9rem);font-weight:700;
  padding:clamp(.35rem,.5vw,.5rem) clamp(.75rem,1.2vw,1.2rem);
  cursor:pointer;display:flex;align-items:center;gap:.3rem;
  box-shadow:0 2px 8px rgba(242,169,59,.3);transition:background .15s,transform .12s;
}
.btn-next:hover{background:#d9922a;transform:translateY(-1px)}

/* RESULT */
#result{display:none;max-width:min(620px,96vw);margin:0 auto;padding:clamp(1.2rem,3vw,2rem) clamp(12px,4vw,2rem) 3rem;overflow-y:auto;height:100vh;background:var(--paper)}
.result-h{font-family:'DM Serif Display',serif;font-size:clamp(1.1rem,2.5vw,1.5rem);color:var(--ink);margin-bottom:.25rem}
.result-sub{font-size:.78rem;color:var(--mid);margin-bottom:1.3rem;line-height:1.6}
.r-list{background:var(--white);border:1.5px solid var(--mist);border-radius:var(--r);overflow:hidden;margin-bottom:1.1rem}
.r-list-head{background:var(--faint);padding:.5rem 1rem;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mid);border-bottom:1px solid var(--mist)}
.r-item{display:flex;align-items:flex-start;gap:.6rem;padding:.62rem 1rem;border-bottom:1px solid var(--faint);transition:background .14s}
.r-item:last-child{border-bottom:none}
.r-item:hover{background:var(--kr-soft)}
.r-num{width:22px;height:22px;background:var(--kr-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:var(--kr);flex-shrink:0;margin-top:.1rem}
.r-text{font-family:'Noto Sans KR',sans-serif;font-size:.78rem;line-height:1.6;flex:1;color:var(--ink)}
.r-play{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--mid);flex-shrink:0;transition:color .15s}
.r-play:hover{color:var(--kr)}
.r-btns{display:flex;gap:.6rem}
.btn-retake{flex:1;background:var(--kr);border:none;border-radius:var(--r);color:#fff;font-family:'Sora',sans-serif;font-size:.8rem;font-weight:700;padding:.65rem 1rem;cursor:pointer;transition:background .15s}
.btn-retake:hover{background:var(--kr-dark)}
.btn-home{flex:1;background:var(--white);border:1.5px solid var(--mist);border-radius:var(--r);color:var(--ink);font-family:'Sora',sans-serif;font-size:.8rem;font-weight:700;padding:.65rem 1rem;cursor:pointer;transition:border-color .15s}
.btn-home:hover{border-color:var(--kr)}

.toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(44px);background:var(--ink);color:#fff;padding:.42rem 1.1rem;border-radius:99px;font-size:.7rem;font-weight:600;z-index:999;pointer-events:none;opacity:0;transition:transform .22s,opacity .22s;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}




/* ════════════════════════════
   RESPONSIVE BREAKPOINTS
   Key: --av controls everything.
   Total layout width = --av (avatar)
     + --vol-w (20px) + --wrap-gap 
     + right (flex:1)
   We ensure: --av stays ~28-30% of vw
   so layout never overflows.
════════════════════════════ */

/* ── Base (all screens) ── */
:root{
  --refresh-w:clamp(76px,11vw,120px);
}

/* ── Phone small ≤360px ── */
@media(max-width:360px){
  :root{--av:clamp(72px,26vw,100px);--pad:8px;--wrap-gap:6px;--vol-w:16px;--refresh-w:70px}
  .q-chip{width:clamp(16px,5vw,22px);height:clamp(16px,5vw,22px);font-size:clamp(.48rem,2.5vw,.65rem)}
  .refresh-label{display:none} /* icon only on very small screens */
  .btn-refresh{width:36px;padding:.3rem}
  :root{--refresh-w:36px}
  .clock-display{font-size:clamp(1.1rem,6.5vw,1.6rem)}
}

/* ── Phone portrait 361–480px (S23 Ultra=412px) ── */
@media(min-width:361px) and (max-width:480px){
  :root{--av:clamp(78px,26vw,120px);--pad:10px;--wrap-gap:8px;--vol-w:18px;--refresh-w:clamp(76px,18vw,100px)}
  .q-chip{width:clamp(18px,5.2vw,26px);height:clamp(18px,5.2vw,26px);font-size:clamp(.5rem,2.5vw,.68rem)}
  .clock-display{font-size:clamp(1.2rem,6.5vw,1.9rem)}
}

/* ── Phone portrait 481–600px ── */
@media(min-width:481px) and (max-width:600px){
  :root{--av:clamp(100px,24vw,145px);--pad:12px;--wrap-gap:10px;--refresh-w:clamp(80px,14vw,105px)}
  .q-chip{width:clamp(20px,4.5vw,28px);height:clamp(20px,4.5vw,28px)}
  .clock-display{font-size:clamp(1.3rem,5.5vw,2rem)}
}

/* ── Landscape phone (height ≤ 480px) ── */
@media(max-height:480px){
  :root{--av:clamp(60px,min(14vw,22vh),140px);--pad:8px;--wrap-gap:8px}
  .topbar{padding:.2rem var(--pad)}
  .clock-bar{padding:.12rem var(--pad)}
  .clock-display{font-size:clamp(.85rem,2.2vw,1.4rem)}
  .exam-main{padding:.3rem var(--pad)}
  .btn-refresh{padding:.2rem .4rem}
}

/* ── Tablet 601–1023px ── */
@media(min-width:601px) and (max-width:1023px){
  :root{--av:clamp(120px,20vw,220px);--pad:16px;--wrap-gap:14px;--refresh-w:clamp(90px,11vw,115px)}
  .clock-display{font-size:clamp(1.6rem,4vw,2.4rem)}
}

/* ── Desktop 1024–1399px ── */
@media(min-width:1024px) and (max-width:1399px){
  :root{--av:clamp(160px,18vw,260px);--pad:20px;--wrap-gap:18px;--refresh-w:clamp(100px,10vw,120px)}
  .clock-display{font-size:clamp(2rem,3.5vw,2.6rem)}
}

/* ── Large desktop 1400–1799px ── */
@media(min-width:1400px) and (max-width:1799px){
  :root{--av:clamp(220px,17vw,300px);--pad:24px;--wrap-gap:22px;--refresh-w:clamp(110px,9vw,130px)}
  .clock-display{font-size:clamp(2.2rem,3vw,2.8rem)}
}

/* ── 4K / Large TV ≥1800px ── */
@media(min-width:1800px){
  :root{--av:clamp(260px,16vw,360px);--pad:32px;--wrap-gap:28px;--refresh-w:130px}
  .clock-display{font-size:clamp(2.5rem,3vw,3.5rem)}
  .q-chip{width:clamp(36px,2.5vw,48px);height:clamp(36px,2.5vw,48px);font-size:clamp(.8rem,.7vw,1.1rem)}
  .r-list{max-width:800px;margin-left:auto;margin-right:auto}
}
</style>
</head>
<body>

<div id="exam">
  <div class="topbar">
    <div class="hero-line">
      <p class="hero-eye">Korean</p>
      <h1 class="hero-title">🇰🇷 OPIc Test</h1>
    </div>
  </div>
  <div class="clock-bar">
    <button class="btn-refresh" onclick="loadRandom()">
      <span class="refresh-icon">↻</span>
      <span class="refresh-label">New Test</span>
    </button>
    <div class="clock-center">
      <div class="clock-display" id="clockDisplay">40:00</div>
    </div>
    <div style="width:var(--refresh-w)"></div><!-- balance spacer -->
  </div>
  <div class="exam-main">
    <div class="exam-wrap">
      <!-- LEFT -->
      <div class="left-col">
        <div class="avatar-wrap">
          <img class="avatar-img" src="https://luandai123.github.io/Korean_Opic/AvatarOPIC.png" alt="OPIc Interviewer">
          <div class="play-bar" onclick="handlePlay()">
            <div class="play-icon-btn" id="playIcon">▶</div>
            <div class="play-track"><div class="play-fill" id="replayFill"></div></div>
          </div>
        </div>
        <div class="vol-col" id="volCol">
          <div class="vol-track" id="volTrack" onclick="volClick(event)">
            <div class="vol-fill" id="volFill" style="height:80%"></div>
            <div class="vol-handle" id="volHandle" style="bottom:calc(80% - 6px)"></div>
          </div>
          <div class="vol-mic">🎤</div>
        </div>
      </div>
      <!-- RIGHT WRAPPER -->
      <div class="right-wrapper">
        <!-- Q block: always visible -->
        <div class="q-block">
          <div class="q-label" id="qProgressLabel">Question 1 of 15</div>
          <div class="q-strip" id="qStrip"></div>
        </div>
        <!-- Controls: hidden until audio ends -->
        <div class="right-col" id="rightCol">
          <button class="btn-record" id="btnRec" onclick="toggleRec()" disabled>
            <span id="recTxt">Recording ...</span>
            <span class="rec-dots">····</span>
          </button>
          <div class="resp-section" id="respSection" style="display:none">
            <div class="resp-label">Response Time:</div>
            <div class="resp-bar-outer"><div class="resp-bar-inner" id="respBar" style="width:100%"></div></div>
            <div class="resp-time-row"><span class="resp-time" id="respTime">1:30</span></div>
          </div>
        </div>
        <!-- Next at bottom of right-wrapper -->
        <div class="next-anchor" id="nextAnchor">
          <button class="btn-next" onclick="nextQ()">Next ›</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="result">
  <div class="result-h">✅ Hoàn thành bài thi!</div>
  <div class="result-sub">Nhấn 🔊 để nghe lại từng câu.</div>
  <div class="r-list">
    <div class="r-list-head">Câu hỏi — <span id="rName"></span></div>
    <div id="rList"></div>
  </div>
  <div class="r-btns">
    <button class="btn-retake" onclick="retake()">🔄 Thi lại đề này</button>
    <button class="btn-home" onclick="loadRandom()">🔀 Đề ngẫu nhiên</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── DATA ── */
const ALL=[
["Test 1",1,"지금부터 인터뷰를 시작하겠습니다. 먼저 자기에 대해 말하십시오!","https://luandai123.github.io/Korean_Opic/Test 1.1.mp3"],
["Test 1",2,"학교 밖 생활에 어떻게 적응했습니까?","https://luandai123.github.io/Korean_Opic/Test 1.2.mp3"],
["Test 1",3,"졸업 후 가장 큰 변화는 무엇입니까?","https://luandai123.github.io/Korean_Opic/Test 1.3.mp3"],
["Test 1",4,"학교 다닐 때 어떤 능력을 개발하여 경력에 도움이 되었나요?","https://luandai123.github.io/Korean_Opic/Test 1.4.mp3"],
["Test 1",5,"어디에 사는지 알고 싶습니다. 집에 대해 묘사해 줄 수 있습니까? 방이 몇 개입니까?","https://luandai123.github.io/Korean_Opic/Test 1.5.mp3"],
["Test 1",6,"어릴 때 살았던 집을 설명해 주십시오. 현재 살고 있는 집과 어떻게 달랐습니까?","https://luandai123.github.io/Korean_Opic/Test 1.6.mp3"],

];

const RESP={1:60,2:60,3:90,4:120,5:60,6:90,7:120,8:60,9:90,10:120,11:60,12:90,13:120,14:120,15:120};
const TESTS=[...new Set(ALL.map(r=>r[0]))];
function getTest(n){return ALL.filter(r=>r[0]===n);}

/* STATE */
let curTest=null,curIdx=0,startMs=null;
let audio=null,vol=0.8,isRec=false,hasPlayed=false,replayUsed=false;
let respInt=null,respSec=0,respTotal=90;

/* CLOCK */
const TOTAL_SECS=40*60;
let clockInt=null,clockSec=TOTAL_SECS;
function startClock(){
  clearInterval(clockInt);clockSec=TOTAL_SECS;updateClock();
  clockInt=setInterval(()=>{clockSec--;updateClock();if(clockSec<=0){clearInterval(clockInt);finish();}},1000);
}
function stopClock(){clearInterval(clockInt);clockInt=null;}
function updateClock(){
  let m=String(Math.floor(clockSec/60)).padStart(2,'0');
  let s=String(clockSec%60).padStart(2,'0');
  let el=document.getElementById('clockDisplay');
  el.textContent=m+':'+s;
  el.className='clock-display'+(clockSec<=120?' urgent':clockSec<=300?' warn':'');
}

/* SHOW/HIDE CONTROLS */
function showControls(){
  document.getElementById('rightCol').style.visibility='visible';
  document.getElementById('nextAnchor').style.visibility='visible';
}
function hideControls(){
  document.getElementById('rightCol').style.visibility='hidden';
  document.getElementById('nextAnchor').style.visibility='hidden';
  document.getElementById('volCol').style.visibility='hidden';
}

/* START */
function startTest(name){
  curTest=name;curIdx=0;startMs=Date.now();
  document.getElementById('result').style.display='none';
  document.getElementById('exam').style.display='flex';
  buildStrip();renderQ();
  startClock();
}
function loadRandom(){
  stopClock();
  let name=TESTS[Math.floor(Math.random()*TESTS.length)];
  startTest(name);
}

/* STRIP */
function buildStrip(){
  let qs=getTest(curTest);
  let s=document.getElementById('qStrip');
  s.innerHTML='';
  qs.forEach((_,i)=>{
    let c=document.createElement('div');
    c.className='q-chip'+(i===0?' active':'');
    c.id='c'+i;c.textContent=i+1;
    s.appendChild(c);
  });
}
function syncStrip(){
  let qs=getTest(curTest);
  qs.forEach((_,i)=>{
    let c=document.getElementById('c'+i);if(!c)return;
    c.className='q-chip'+(i===curIdx?' active':i<curIdx?' done':'');
  });
  let ac=document.getElementById('c'+curIdx);
  if(ac) ac.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  let lbl=document.getElementById('qProgressLabel');
  if(lbl) lbl.textContent='Question '+(curIdx+1)+' of '+qs.length;
}

/* RENDER */
function renderQ(){
  syncStrip();
  document.getElementById('replayFill').style.width='0%';
  document.getElementById('playIcon').textContent='▶';
  hideControls();
  let rb=document.getElementById('btnRec');
  rb.disabled=true;isRec=false;
  document.getElementById('recTxt').textContent='Recording ...';
  document.getElementById('respSection').style.display='none';
  clearRespTimer();
  hasPlayed=false;replayUsed=false;
}

/* AUDIO */
function playAudio(){
  let q=getTest(curTest)[curIdx];
  if(!q[3]){toast('Không có audio');return;}
  if(audio){audio.pause();audio.ontimeupdate=null;audio.onended=null;audio=null;}
  let a=new Audio(q[3]);a.volume=vol;audio=a;
  a.ontimeupdate=()=>{if(a.duration)document.getElementById('replayFill').style.width=(a.currentTime/a.duration*100)+'%';};
  a.onended=()=>{
    document.getElementById('replayFill').style.width='100%';
    audio=null;hasPlayed=true;
    document.getElementById('playIcon').textContent='↻';
    showControls();
    let rb=document.getElementById('btnRec');rb.disabled=false;
    isRec=true;rb.classList.add('recording');
    startRespTimer();startMicLevel();
    toast('🔴 Đang ghi âm...');
  };
  a.onerror=()=>{toast('Lỗi audio');audio=null;};
  a.play().catch(()=>{toast('Không phát được');audio=null;});
}

function handlePlay(){
  if(!hasPlayed){
    playAudio();
  } else if(!replayUsed){
    replayUsed=true;
    stopMicLevel();clearRespTimer();
    isRec=false;
    document.getElementById('btnRec').classList.remove('recording');
    document.getElementById('respSection').style.display='none';
    hideControls();
    document.getElementById('playIcon').textContent='↻';
    hasPlayed=false;
    playAudio();
  } else {
    toast('⚠️ Chỉ được replay 1 lần');
  }
}

function stopAll(){
  clearRespTimer();isRec=false;stopMicLevel();
  if(audio){audio.pause();audio.ontimeupdate=null;audio.onended=null;audio=null;}
}

/* VOLUME */
function volClick(e){
  let t=document.getElementById('volTrack'),rect=t.getBoundingClientRect();
  setVol(Math.max(0,Math.min(1,1-(e.clientY-rect.top)/rect.height)));
}
function setVol(v){
  vol=v;if(audio)audio.volume=vol;
  let pct=(v*100)+'%';
  document.getElementById('volFill').style.height=pct;
  document.getElementById('volHandle').style.bottom='calc('+pct+' - 6px)';
}

/* MIC LEVEL */
let audioCtx=null,analyser=null,micStream=null,levelInt=null;
function startMicLevel(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    micStream=stream;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;
    let src=audioCtx.createMediaStreamSource(stream);src.connect(analyser);
    let data=new Uint8Array(analyser.frequencyBinCount);
    let handle=document.getElementById('volHandle');
    let track=document.getElementById('volTrack');
    document.getElementById('volCol').style.visibility='visible';
    handle.classList.add('pulsing');
    levelInt=setInterval(()=>{
      analyser.getByteFrequencyData(data);
      let avg=data.reduce((a,b)=>a+b,0)/data.length;
      let pct=Math.min(95,Math.max(5,(avg/128)*100));
      let trackH=track.getBoundingClientRect().height;
      handle.style.bottom=(pct/100*trackH-6)+'px';
    },80);
  }).catch(()=>{});
}
function stopMicLevel(){
  clearInterval(levelInt);levelInt=null;
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  document.getElementById('volCol').style.visibility='hidden';
  let handle=document.getElementById('volHandle');
  if(handle){handle.classList.remove('pulsing');handle.style.bottom='calc(80% - 6px)';}
}

/* RECORD */
function toggleRec(){
  isRec=!isRec;
  let rb=document.getElementById('btnRec');
  rb.classList.toggle('recording',isRec);
  if(isRec){startRespTimer();startMicLevel();toast('🔴 Đang ghi âm');}
  else{clearRespTimer();stopMicLevel();document.getElementById('respSection').style.display='none';toast('⏹ Đã dừng');}
}

/* TIMER */
function startRespTimer(){
  clearRespTimer();
  let q=getTest(curTest)[curIdx];
  respTotal=RESP[q[1]]||90;respSec=respTotal;
  document.getElementById('respSection').style.display='flex';
  drawResp();
  respInt=setInterval(()=>{respSec--;drawResp();if(respSec<=0){clearRespTimer();autoNext();}},1000);
}
function drawResp(){
  let pct=Math.max(0,respSec/respTotal*100);
  let bar=document.getElementById('respBar');
  bar.style.width=pct+'%';
  bar.className='resp-bar-inner'+(respSec<=10?' urgent':respSec<=20?' warn':'');
  let m=String(Math.floor(respSec/60)).padStart(2,'0'),s=String(respSec%60).padStart(2,'0');
  document.getElementById('respTime').textContent=m+':'+s;
}
function clearRespTimer(){clearInterval(respInt);respInt=null;}
function autoNext(){toast('⏰ Hết giờ');setTimeout(()=>nextQ(),800);}

/* NEXT */
function nextQ(){
  stopAll();
  let total=getTest(curTest).length;
  if(curIdx<total-1){curIdx++;isRec=false;renderQ();}
  else finish();
}

/* FINISH */
function finish(){
  stopAll();stopClock();
  document.getElementById('exam').style.display='none';
  let qs=getTest(curTest);
  document.getElementById('rName').textContent=curTest;
  document.getElementById('rList').innerHTML=qs.map(q=>`
    <div class="r-item">
      <div class="r-num">${q[1]}</div>
      <div class="r-text">${q[2]}</div>
      <button class="r-play" onclick="playResult('${q[3]}')">🔊</button>
    </div>`).join('');
  document.getElementById('result').style.display='block';
  window.scrollTo(0,0);
}
function playResult(url){
  if(!url){toast('Không có audio');return;}
  if(audio){audio.pause();audio=null;}
  let a=new Audio(url);a.volume=vol;audio=a;
  a.play().catch(()=>toast('Không phát được'));
  toast('🔊 Đang phát...');
}
function retake(){document.getElementById('result').style.display='none';startTest(curTest);}

function toast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('on'),2200);
}

/* INIT */
loadRandom();
</script>
</body>
