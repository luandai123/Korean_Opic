<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIc · Korean Speaking Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   OPIc Korean Test — Korean_Beginner1 style
   Font: Sora + DM Serif Display + Noto Sans KR
   Base: 16px, fluid type via clamp()
══════════════════════════════════════════ */
:root{
  /* Korean_Beginner1 palette */
  --ink:#141414;--paper:#F7F6F2;--mist:#E8E5DE;--mid:#9B97A0;
  --faint:#F0EEE9;--white:#fff;
  --kr:#D44F6E;--kr-dark:#A83454;--kr-soft:#FCEEF2;--kr-mid:#F5C0CE;
  --accent:#F2A93B;--accent-dark:#d9922a;
  --blue:#3B82F6;--blue-dk:#2563EB;
  --r:14px;--r-sm:8px;--r-xs:6px;

  /* Layout — avatar drives all sizing */
  --av:clamp(130px,30vw,360px);
  --vol-w:clamp(16px,2vw,24px);
  --gap:clamp(10px,2vw,22px);
  --pad:clamp(12px,2.5vw,30px);
  --rw:clamp(88px,13vw,138px);

  /* Type scale — Sora standard, harmonious */
  --t-xs: clamp(.68rem,.85vw,.82rem);   /* 10.9–13.1px  label/chip */
  --t-sm: clamp(.78rem,1vw,.94rem);     /* 12.5–15px    body/tag   */
  --t-md: clamp(.88rem,1.15vw,1.05rem); /* 14.1–16.8px  button     */
  --t-lg: clamp(1rem,1.4vw,1.2rem);     /* 16–19.2px    subhead    */
  --t-xl: clamp(1.55rem,3.8vw,2.8rem);  /* 24.8–44.8px  clock      */
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  height:100%;font-family:'Sora',system-ui,sans-serif;
  background:var(--paper);color:var(--ink);
  overflow:hidden;-webkit-font-smoothing:antialiased;
}

/* ── EXAM SHELL ── */
#exam{display:none;flex-direction:column;height:100vh;background:var(--paper)}

/* ── TOPBAR — Korean_Beginner1 style ── */
.topbar{
  background:linear-gradient(135deg,var(--kr) 0%,var(--kr-dark) 100%);
  padding:clamp(.38rem,.6vw,.6rem) var(--pad);
  flex-shrink:0;display:flex;align-items:center;
  position:relative;overflow:hidden;
}
.topbar::after{
  content:'OPIc';position:absolute;right:var(--pad);top:50%;
  transform:translateY(-50%);
  font-size:clamp(2.5rem,6vw,5.5rem);font-weight:700;
  color:rgba(255,255,255,.05);pointer-events:none;letter-spacing:.02em;
}
.hero-line{display:flex;align-items:baseline;gap:.5rem}
.hero-eye{
  font-size:var(--t-xs);font-weight:700;
  letter-spacing:.13em;text-transform:uppercase;
  color:rgba(255,255,255,.55);
}
.hero-flag{font-size:clamp(.9rem,1.4vw,1.3rem);line-height:1;flex-shrink:0}
.hero-title{
  font-family:'DM Serif Display',Georgia,serif;
  font-size:clamp(.9rem,1.2vw,1.25rem);
  color:#fff;margin:0;font-style:italic;letter-spacing:-.01em;
}

/* ── CLOCK BAR ── */
.clock-bar{
  background:var(--white);border-bottom:1.5px solid var(--mist);
  display:flex;align-items:center;
  padding:clamp(.28rem,.55vw,.52rem) var(--pad);
  flex-shrink:0;
}
.clock-center{flex:1;display:flex;justify-content:center}
.clock-display{
  font-family:'DM Serif Display',Georgia,serif;
  font-size:var(--t-xl);font-weight:700;
  color:var(--ink);letter-spacing:.04em;line-height:1;
}
.clock-display.warn{color:var(--accent)}
.clock-display.urgent{color:#ef4444;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}

/* ── REFRESH BTN ── */
.btn-refresh{
  width:var(--rw);flex-shrink:0;
  background:var(--kr);
  border:none;border-radius:99px;color:#fff;
  font-family:'Sora',sans-serif;font-size:var(--t-xs);font-weight:700;
  padding:clamp(.36rem,.55vw,.52rem) clamp(.55rem,.9vw,.85rem);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.38rem;
  letter-spacing:.02em;
  box-shadow:0 2px 10px rgba(212,79,110,.28);
  transition:background .18s,transform .15s,box-shadow .18s;
}
.btn-refresh:hover{
  background:var(--kr-dark);transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(212,79,110,.4);
}
.btn-refresh:active{transform:scale(.97)}
.ri{font-size:var(--t-sm);transition:transform .4s ease}
.btn-refresh:hover .ri{transform:rotate(180deg)}
.rl{white-space:nowrap}

/* ── EXAM MAIN ── */
.exam-main{
  flex:1;min-height:0;overflow:auto;
  display:flex;align-items:flex-start;
  padding:clamp(.5rem,1.2vw,1rem) var(--pad);
}
.exam-wrap{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:var(--gap);align-items:start;
  width:100%;position:relative;
}

/* ── LEFT COL ── */
.left-col{
  display:flex;gap:clamp(4px,.7vw,9px);
  align-items:stretch;flex-shrink:0;
}
.avatar-wrap{
  width:var(--av);flex-shrink:0;
  display:flex;flex-direction:column;
  border:1.5px solid var(--mist);border-radius:var(--r);
  overflow:hidden;background:var(--white);
  box-shadow:0 2px 14px rgba(0,0,0,.07);
}
.avatar-img{
  width:100%;aspect-ratio:2/3;
  display:block;object-fit:cover;object-position:top center;
}
.play-bar{
  background:var(--kr);
  height:clamp(28px,3.5vw,42px);
  padding:0 clamp(.4rem,.65vw,.65rem);
  display:flex;align-items:center;gap:.38rem;
  cursor:pointer;flex-shrink:0;
  transition:background .15s;
}
.play-bar:hover{background:var(--kr-dark)}
.play-icon-btn{
  width:clamp(20px,2.6vw,30px);height:clamp(20px,2.6vw,30px);
  border-radius:var(--r-xs);background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:var(--t-sm);flex-shrink:0;
}
.play-track{flex:1;height:3px;background:rgba(255,255,255,.28);border-radius:99px;overflow:hidden}
.play-fill{height:100%;background:#fff;border-radius:99px;width:0%;transition:width .2s linear}

/* ── VOL COL ── */
.vol-col{
  width:var(--vol-w);display:flex;flex-direction:column;
  align-items:center;gap:.28rem;flex-shrink:0;
  align-self:stretch;visibility:hidden;
}
.vol-track{width:4px;flex:1;min-height:40px;background:var(--mist);border-radius:99px;position:relative;cursor:pointer}
.vol-fill{position:absolute;bottom:0;left:0;right:0;background:var(--kr);border-radius:99px}
.vol-handle{
  position:absolute;left:50%;transform:translateX(-50%);
  width:13px;height:13px;background:var(--ink);
  border-radius:50%;border:2px solid #fff;
  box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:grab;transition:bottom .08s;
}
.vol-handle.pulsing{background:var(--kr)}
.vol-mic{font-size:var(--t-sm);color:var(--mid);flex-shrink:0}

/* ── RIGHT WRAPPER ── */
.right-wrapper{
  display:flex;flex-direction:column;
  gap:clamp(.4rem,.7vw,.8rem);
  align-self:flex-start;
  min-width:0;overflow:hidden;
  width:min(
    calc(15 * clamp(26px, calc(var(--av) * .185), 44px) + 14 * clamp(4px, .4vw, 6.4px)),
    100%
  );
  /* min-height = avatar total (img 2/3 ratio + playbar) so Next stays at bottom */
  min-height:calc(var(--av) * 1.5 + clamp(28px,3.5vw,42px));
}

/* ── Q BLOCK ── */
.q-block{display:flex;flex-direction:column;gap:clamp(.2rem,.4vw,.38rem)}
.q-label{
  font-size:var(--t-xs);font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--mid);
}
.q-strip{
  display:flex;flex-wrap:nowrap;
  gap:clamp(.25rem,.4vw,.4rem);
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;padding-bottom:2px;
  width:100%;
}
.q-strip::-webkit-scrollbar{display:none}
.q-chip{
  flex-shrink:0;
  width:clamp(26px,calc(var(--av)*.185),44px);
  height:clamp(26px,calc(var(--av)*.185),44px);
  border-radius:var(--r-xs);border:1.5px solid var(--mist);
  background:var(--white);
  font-size:clamp(.65rem,calc(var(--av)*.1),0.88rem);
  font-weight:700;color:var(--mid);
  display:flex;align-items:center;justify-content:center;
  cursor:default;transition:background .15s,border-color .15s,color .15s;
}
.q-chip.active{background:var(--kr);border-color:var(--kr-dark);color:#fff}
.q-chip.done{background:var(--faint);border-color:var(--mist);color:var(--mid)}

/* ── CONTROLS constrained to q-block width ── */
/* ── CONTROLS ── */
.right-col{
  display:flex;flex-direction:column;
  gap:clamp(.42rem,.7vw,.78rem);visibility:hidden;min-width:0;
}
.btn-record{
  width:100%;background:var(--blue);border:none;
  border-radius:var(--r-sm);color:#fff;
  font-family:'Sora',sans-serif;font-size:var(--t-md);font-weight:700;
  padding:clamp(.58rem,.9vw,.88rem) clamp(.75rem,1.2vw,1.2rem);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.48rem;
  transition:background .15s;
  box-shadow:0 2px 12px rgba(59,130,246,.28);
  letter-spacing:.01em;
}
.btn-record:hover{background:var(--blue-dk)}
.btn-record:disabled{background:var(--mist);color:var(--mid);cursor:not-allowed;box-shadow:none}
.rec-dots{
  font-size:var(--t-md);letter-spacing:.18em;
  color:rgba(255,255,255,.85);animation:dotsFade 1.2s ease-in-out infinite;
}
@keyframes dotsFade{0%,100%{opacity:.2}50%{opacity:1}}

/* Response Time bar */
.resp-section{display:flex;flex-direction:column;gap:clamp(.22rem,.4vw,.4rem)}
.resp-bar-outer{
  height:clamp(14px,min(2.2vw,3.5vh),28px);
  border:1.5px solid var(--mist);border-radius:var(--r-xs);
  background:var(--white);overflow:hidden;
}
.resp-bar-inner{height:100%;background:var(--blue);transition:width .5s linear;border-radius:4px}
.resp-bar-inner.warn{background:var(--accent)}
.resp-bar-inner.urgent{background:#ef4444}
.resp-time-row{display:flex;justify-content:flex-end}
.resp-time{font-size:var(--t-sm);font-weight:700;color:var(--mid);letter-spacing:.03em}

/* Next */
.next-anchor{
  display:flex;justify-content:flex-end;
  margin-top:auto;padding-top:clamp(.38rem,.6vw,.6rem);
  visibility:hidden;flex-shrink:0;
}
.btn-next{
  background:var(--accent);border:none;border-radius:var(--r-sm);
  color:#fff;font-family:'Sora',sans-serif;
  font-size:var(--t-md);font-weight:700;
  padding:clamp(.48rem,.72vw,.7rem) clamp(.95rem,1.5vw,1.5rem);
  cursor:pointer;display:flex;align-items:center;gap:.35rem;
  box-shadow:0 2px 10px rgba(242,169,59,.3);
  transition:background .15s,transform .12s,box-shadow .15s;
  letter-spacing:.01em;
}
.btn-next:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(242,169,59,.42)}

/* ── RESULT ── */
#result{display:none;height:100vh;overflow-y:auto;background:var(--paper)}
.result-inner{
  max-width:min(700px,96vw);margin:0 auto;
  padding:clamp(1.5rem,3vw,2.5rem) clamp(14px,4vw,2.5rem) 4rem;
}
.result-h{
  font-family:'DM Serif Display',Georgia,serif;
  font-size:clamp(1.3rem,3vw,1.9rem);color:var(--ink);margin-bottom:.4rem;
}
.result-sub{font-size:var(--t-sm);color:var(--mid);margin-bottom:1.6rem;line-height:1.7}
.r-list{
  background:var(--white);border:1.5px solid var(--mist);
  border-radius:var(--r);overflow:hidden;margin-bottom:1.4rem;
}
.r-list-head{
  background:var(--faint);padding:.58rem 1.2rem;
  font-size:var(--t-xs);font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--mid);
  border-bottom:1.5px solid var(--mist);
}
.r-item{
  display:flex;align-items:flex-start;gap:.75rem;
  padding:.75rem 1.2rem;border-bottom:1px solid var(--faint);
  transition:background .13s;
}
.r-item:last-child{border-bottom:none}
.r-item:hover{background:var(--kr-soft)}
.r-num{
  width:clamp(22px,2.5vw,30px);height:clamp(22px,2.5vw,30px);
  background:var(--kr-soft);border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:var(--t-xs);font-weight:700;color:var(--kr);margin-top:.1rem;
}
.r-text{
  font-family:'Noto Sans KR',sans-serif;
  font-size:var(--t-sm);line-height:1.7;flex:1;color:var(--ink);
}
.r-play{
  background:none;border:none;cursor:pointer;
  font-size:var(--t-lg);color:var(--mid);flex-shrink:0;
  transition:color .15s,transform .12s;padding:.1rem;
}
.r-play:hover{color:var(--kr);transform:scale(1.15)}
.r-btns{display:flex;gap:.75rem}
.btn-retake{
  flex:1;background:var(--kr);border:none;border-radius:var(--r-sm);
  color:#fff;font-family:'Sora',sans-serif;font-size:var(--t-md);font-weight:700;
  padding:.72rem 1rem;cursor:pointer;
  box-shadow:0 2px 10px rgba(212,79,110,.22);
  transition:background .15s,transform .12s;
}
.btn-retake:hover{background:var(--kr-dark);transform:translateY(-1px)}
.btn-home{
  flex:1;background:var(--white);border:1.5px solid var(--mist);
  border-radius:var(--r-sm);color:var(--ink);font-family:'Sora',sans-serif;
  font-size:var(--t-md);font-weight:700;padding:.72rem 1rem;cursor:pointer;
  transition:border-color .15s,transform .12s;
}
.btn-home:hover{border-color:var(--kr);transform:translateY(-1px)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:1.4rem;left:50%;
  transform:translateX(-50%) translateY(52px);
  background:rgba(20,20,20,.92);backdrop-filter:blur(10px);
  color:#fff;padding:.48rem 1.2rem;border-radius:99px;
  font-size:var(--t-xs);font-weight:600;z-index:999;
  pointer-events:none;opacity:0;
  transition:transform .24s,opacity .24s;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* ══ RESPONSIVE ══ */
/* ≤360px */
@media(max-width:360px){
  :root{--av:clamp(90px,30vw,130px);--pad:9px;--gap:7px;--vol-w:14px;--rw:32px}
  .rl{display:none}.btn-refresh{width:32px;padding:.3rem .4rem}
}
/* 361–480px (S23 Ultra 412px) */
@media(min-width:361px) and (max-width:480px){
  :root{--av:clamp(100px,28vw,145px);--pad:11px;--gap:9px;--vol-w:16px;--rw:clamp(80px,19vw,102px)}
}
/* 481–640px */
@media(min-width:481px) and (max-width:640px){
  :root{--av:clamp(125px,25vw,175px);--pad:13px;--gap:11px;--rw:clamp(86px,16vw,110px)}
}
/* Landscape height ≤460px */
@media(max-height:460px){
  :root{--av:clamp(54px,min(13vw,19vh),120px);--pad:8px;--gap:7px}
  .topbar,.clock-bar{padding-top:.18rem;padding-bottom:.18rem}
  .exam-main{padding-top:.3rem;padding-bottom:.3rem}
}
/* Tablet 641–1023px */
@media(min-width:641px) and (max-width:1023px){
  :root{--av:clamp(160px,23vw,280px);--pad:18px;--gap:16px;--rw:clamp(96px,12vw,124px)}
}
/* Desktop 1024–1399px */
@media(min-width:1024px) and (max-width:1399px){
  :root{--av:clamp(215px,21vw,325px);--pad:26px;--gap:20px;--rw:clamp(108px,10.5vw,134px)}
}
/* Large 1400–1799px */
@media(min-width:1400px) and (max-width:1799px){
  :root{--av:clamp(270px,20vw,375px);--pad:32px;--gap:24px;--rw:clamp(118px,9.5vw,142px)}
}
/* 4K ≥1800px */
@media(min-width:1800px){
  :root{--av:clamp(335px,19vw,460px);--pad:40px;--gap:30px;--rw:150px}
  .result-inner{max-width:820px}
}
/* Font fallback */
@font-face{font-family:'DM Serif Display';src:local('Georgia');size-adjust:106%;font-style:normal}
</style>
</head>
<body>

<div id="exam">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="hero-line">
      <p class="hero-eye">Korean</p>
      <span class="hero-flag">🇰🇷</span>
      <h1 class="hero-title"><em>OPIc Test</em></h1>
    </div>
  </div>

  <!-- CLOCK BAR -->
  <div class="clock-bar">
    <button class="btn-refresh" onclick="loadRandom()">
      <span class="ri">↻</span>
      <span class="rl">New Test</span>
    </button>
    <div class="clock-center">
      <div class="clock-display" id="clockDisplay">40:00</div>
    </div>
    <div style="width:var(--rw);flex-shrink:0"></div>
  </div>

  <!-- MAIN -->
  <div class="exam-main">
    <div class="exam-wrap">

      <!-- LEFT -->
      <div class="left-col">
        <div class="avatar-wrap">
          <img class="avatar-img"
               src="https://luandai123.github.io/Korean_Opic/AvatarOPIC.png"
               alt="OPIc Interviewer">
          <div class="play-bar" onclick="handlePlay()">
            <div class="play-icon-btn" id="playIcon">▶</div>
            <div class="play-track"><div class="play-fill" id="replayFill"></div></div>
          </div>
        </div>
        <div class="vol-col" id="volCol">
          <div class="vol-track" id="volTrack" onclick="volClick(event)">
            <div class="vol-fill" id="volFill" style="height:80%"></div>
            <div class="vol-handle" id="volHandle" style="bottom:calc(80% - 7px)"></div>
          </div>
          <div class="vol-mic">🎤</div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right-wrapper">
        <!-- Question progress — always visible -->
        <div class="q-block">
          <div class="q-label" id="qLabel">Question 1 of 15</div>
          <div class="q-strip" id="qStrip"></div>
        </div>
        <div class="right-col" id="rightCol">
          <button class="btn-record" id="btnRec" onclick="toggleRec()" disabled>
            <span id="recTxt">Recording ...</span>
            <span class="rec-dots">····</span>
          </button>
          <div class="resp-section" id="respSection" style="display:none">
            <div class="resp-bar-outer">
              <div class="resp-bar-inner" id="respBar" style="width:100%"></div>
            </div>
            <div class="resp-time-row">
              <span class="resp-time" id="respTime">1:30</span>
            </div>
          </div>
        </div>
        <!-- Next — visible after audio ends -->
        <div class="next-anchor" id="nextAnchor">
          <button class="btn-next" onclick="nextQ()">Next ›</button>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="result-inner">
    <div class="result-h">✅ Hoàn thành bài thi!</div>
    <div class="result-sub">Nhấn 🔊 để nghe lại từng câu hỏi.</div>
    <div class="r-list">
      <div class="r-list-head">Câu hỏi — <span id="rName"></span></div>
      <div id="rList"></div>
    </div>
    <div class="r-btns">
      <button class="btn-retake" onclick="retake()">🔄 Thi lại đề này</button>
      <button class="btn-home" onclick="loadRandom()">🔀 Đề ngẫu nhiên</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const ALL=[
["Test 1",1,"지금부터 인터뷰를 시작하겠습니다. 먼저 자기에 대해 말하십시오!","https://luandai123.github.io/Korean_Opic/Test 1.1.mp3"],
["Test 1",2,"학교 밖 생활에 어떻게 적응했습니까?","https://luandai123.github.io/Korean_Opic/Test 1.2.mp3"],
["Test 1",3,"졸업 후 가장 큰 변화는 무엇입니까?","https://luandai123.github.io/Korean_Opic/Test 1.3.mp3"],

const RESP={1:60,2:60,3:90,4:120,5:60,6:90,7:120,8:60,9:90,10:120,11:60,12:90,13:120,14:120,15:120};
const TESTS=[...new Set(ALL.map(r=>r[0]))];
function getTest(n){return ALL.filter(r=>r[0]===n);}

/* STATE */
let curTest=null,curIdx=0,startMs=null;
let audio=null,vol=0.8,isRec=false,hasPlayed=false,replayUsed=false;
let respInt=null,respSec=0,respTotal=90;

/* CLOCK */
const TOTAL_SECS=40*60;
let clockInt=null,clockSec=TOTAL_SECS;
function startClock(){
  clearInterval(clockInt);clockSec=TOTAL_SECS;updateClock();
  clockInt=setInterval(()=>{clockSec--;updateClock();if(clockSec<=0){clearInterval(clockInt);finish();}},1000);
}
function stopClock(){clearInterval(clockInt);clockInt=null;}
function updateClock(){
  let m=String(Math.floor(clockSec/60)).padStart(2,'0');
  let s=String(clockSec%60).padStart(2,'0');
  let el=document.getElementById('clockDisplay');
  el.textContent=m+':'+s;
  el.className='clock-display'+(clockSec<=120?' urgent':clockSec<=300?' warn':'');
}

/* SHOW/HIDE */
function showControls(){
  document.getElementById('rightCol').style.visibility='visible';
  document.getElementById('nextAnchor').style.visibility='visible';
}
function hideControls(){
  document.getElementById('rightCol').style.visibility='hidden';
  document.getElementById('nextAnchor').style.visibility='hidden';
  document.getElementById('volCol').style.visibility='hidden';
}

/* START */
function startTest(name){
  curTest=name;curIdx=0;startMs=Date.now();
  document.getElementById('result').style.display='none';
  document.getElementById('exam').style.display='flex';
  buildStrip();renderQ();startClock();
}
function loadRandom(){
  stopClock();
  startTest(TESTS[Math.floor(Math.random()*TESTS.length)]);
}

/* STRIP */
function buildStrip(){
  let qs=getTest(curTest);
  let s=document.getElementById('qStrip');s.innerHTML='';
  qs.forEach((_,i)=>{
    let c=document.createElement('div');
    c.className='q-chip'+(i===0?' active':'');c.id='c'+i;c.textContent=i+1;
    s.appendChild(c);
  });
}
function syncStrip(){
  let qs=getTest(curTest);
  qs.forEach((_,i)=>{
    let c=document.getElementById('c'+i);if(!c)return;
    c.className='q-chip'+(i===curIdx?' active':i<curIdx?' done':'');
  });
  let lbl=document.getElementById('qLabel');
  if(lbl) lbl.textContent='Question '+(curIdx+1)+' of '+qs.length;
  let ac=document.getElementById('c'+curIdx);
  if(ac) ac.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

/* RENDER */
function renderQ(){
  syncStrip();
  document.getElementById('replayFill').style.width='0%';
  document.getElementById('playIcon').textContent='▶';
  hideControls();
  let rb=document.getElementById('btnRec');
  rb.disabled=true;rb.classList.remove('recording');isRec=false;
  document.getElementById('recTxt').textContent='Recording ...';
  document.getElementById('respSection').style.display='none';
  clearRespTimer();hasPlayed=false;replayUsed=false;
}

/* AUDIO */
function playAudio(){
  let q=getTest(curTest)[curIdx];
  if(!q[3]){toast('Không có audio');return;}
  if(audio){audio.pause();audio.ontimeupdate=null;audio.onended=null;audio=null;}
  let a=new Audio(q[3]);a.volume=vol;audio=a;
  a.ontimeupdate=()=>{if(a.duration)document.getElementById('replayFill').style.width=(a.currentTime/a.duration*100)+'%';};
  a.onended=()=>{
    document.getElementById('replayFill').style.width='100%';
    audio=null;hasPlayed=true;
    document.getElementById('playIcon').textContent='↻';
    showControls();
    let rb=document.getElementById('btnRec');rb.disabled=false;
    isRec=true;rb.classList.add('recording');
    startRespTimer();startMicLevel();
    toast('🔴 Đang ghi âm...');
  };
  a.onerror=()=>{toast('Lỗi audio');audio=null;};
  a.play().catch(()=>{toast('Không phát được');audio=null;});
}

function handlePlay(){
  if(!hasPlayed){
    playAudio();
  } else if(!replayUsed){
    replayUsed=true;
    stopMicLevel();clearRespTimer();
    isRec=false;
    document.getElementById('btnRec').classList.remove('recording');
    document.getElementById('respSection').style.display='none';
    hideControls();
    document.getElementById('playIcon').textContent='↻';
    hasPlayed=false;playAudio();
  } else {
    toast('⚠️ Chỉ được replay 1 lần');
  }
}

function stopAll(){
  clearRespTimer();isRec=false;stopMicLevel();
  if(audio){audio.pause();audio.ontimeupdate=null;audio.onended=null;audio=null;}
}

/* VOLUME */
function volClick(e){
  let t=document.getElementById('volTrack'),rect=t.getBoundingClientRect();
  setVol(Math.max(0,Math.min(1,1-(e.clientY-rect.top)/rect.height)));
}
function setVol(v){
  vol=v;if(audio)audio.volume=vol;
  let pct=(v*100)+'%';
  document.getElementById('volFill').style.height=pct;
  document.getElementById('volHandle').style.bottom='calc('+pct+' - 7px)';
}

/* MIC LEVEL */
let audioCtx=null,analyser=null,micStream=null,levelInt=null;
function startMicLevel(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    micStream=stream;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;
    let src=audioCtx.createMediaStreamSource(stream);src.connect(analyser);
    let data=new Uint8Array(analyser.frequencyBinCount);
    let handle=document.getElementById('volHandle');
    let track=document.getElementById('volTrack');
    document.getElementById('volCol').style.visibility='visible';
    handle.classList.add('pulsing');
    levelInt=setInterval(()=>{
      analyser.getByteFrequencyData(data);
      let avg=data.reduce((a,b)=>a+b,0)/data.length;
      let pct=Math.min(95,Math.max(5,(avg/128)*100));
      let trackH=track.getBoundingClientRect().height;
      handle.style.bottom=(pct/100*trackH-7)+'px';
    },80);
  }).catch(()=>{});
}
function stopMicLevel(){
  clearInterval(levelInt);levelInt=null;
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
  document.getElementById('volCol').style.visibility='hidden';
  let h=document.getElementById('volHandle');
  if(h){h.classList.remove('pulsing');h.style.bottom='calc(80% - 7px)';}
}

/* RECORD */
function toggleRec(){
  isRec=!isRec;
  let rb=document.getElementById('btnRec');
  rb.classList.toggle('recording',isRec);
  if(isRec){startRespTimer();startMicLevel();toast('🔴 Đang ghi âm');}
  else{clearRespTimer();stopMicLevel();document.getElementById('respSection').style.display='none';toast('⏹ Đã dừng');}
}

/* TIMER */
function startRespTimer(){
  clearRespTimer();
  let q=getTest(curTest)[curIdx];
  respTotal=RESP[q[1]]||90;respSec=respTotal;
  document.getElementById('respSection').style.display='flex';
  drawResp();
  respInt=setInterval(()=>{respSec--;drawResp();if(respSec<=0){clearRespTimer();autoNext();}},1000);
}
function drawResp(){
  let pct=Math.max(0,respSec/respTotal*100);
  let bar=document.getElementById('respBar');
  bar.style.width=pct+'%';
  bar.className='resp-bar-inner'+(respSec<=10?' urgent':respSec<=20?' warn':'');
  let m=String(Math.floor(respSec/60)).padStart(2,'0'),s=String(respSec%60).padStart(2,'0');
  document.getElementById('respTime').textContent=m+':'+s;
}
function clearRespTimer(){clearInterval(respInt);respInt=null;}
function autoNext(){toast('⏰ Hết giờ');setTimeout(()=>nextQ(),800);}

/* NEXT */
function nextQ(){
  stopAll();
  let total=getTest(curTest).length;
  if(curIdx<total-1){curIdx++;isRec=false;renderQ();}
  else finish();
}

/* FINISH */
function finish(){
  stopAll();stopClock();
  document.getElementById('exam').style.display='none';
  let qs=getTest(curTest);
  document.getElementById('rName').textContent=curTest;
  document.getElementById('rList').innerHTML=qs.map(q=>`
    <div class="r-item">
      <div class="r-num">${q[1]}</div>
      <div class="r-text">${q[2]}</div>
      <button class="r-play" onclick="playResult('${q[3]}')">🔊</button>
    </div>`).join('');
  document.getElementById('result').style.display='block';
  window.scrollTo(0,0);
}
function playResult(url){
  if(!url){toast('Không có audio');return;}
  if(audio){audio.pause();audio=null;}
  let a=new Audio(url);a.volume=vol;audio=a;
  a.play().catch(()=>toast('Không phát được'));
  toast('🔊 Đang phát...');
}
function retake(){document.getElementById('result').style.display='none';startTest(curTest);}

function toast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('on'),2300);
}

loadRandom();
</script>
